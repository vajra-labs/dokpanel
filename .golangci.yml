version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    # staticcheck (honnef.co/go/tools v0.7.0) panics on Go 1.27 promoted-field
    # struct literal syntax. Re-enable once staticcheck supports Go 1.27 stable.
    # - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - noctx
    - prealloc
  settings:
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - noctx
      - path: sqldb/
        linters:
          - unused
          - unparam
